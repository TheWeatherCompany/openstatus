name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "apps/dashboard/**"
      - "apps/workflows/**"
      - "apps/private-location/**"
      - "apps/status-page/**"
      - "apps/checker/**"
      - "apps/migrate-runner/**"
      - "packages/**"
      - "docker-compose.yaml"
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated)'
        required: false
        default: 'server,dashboard,workflows,private-location,status-page,checker,private-location-probe,migrate-runner'
        type: string
      target_env:
        description: 'Target AWS account for ECR push (controls which Environment vars are loaded — dev/nonprod/prod)'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - nonprod
          - prod

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

# ECR is the canonical registry for this fork (private). See ADR 0002 in
# TheWeatherCompany/mercury-openstatus for the rationale. The ECR account
# id is resolved per-run via `vars.AWS_ACCOUNT_ID` from the matching
# GitHub Environment (defaults to dev for main pushes).
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine services to build
        id: set-services
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Convert comma-separated input to JSON array
            SERVICES=$(echo "${{ inputs.services }}" | tr ',' '\n' | jq -R . | jq -sc .)
          else
            # Detect changed files
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            SERVICES_LIST=()

            # packages/** changes affect all services (including migrate-runner,
            # which pulls packages/db source into its image).
            if echo "$CHANGED" | grep -q '^packages/'; then
              SERVICES_LIST=("server" "dashboard" "workflows" "private-location" "status-page" "checker" "private-location-probe" "migrate-runner")
            else
              for svc in server dashboard workflows private-location status-page checker migrate-runner; do
                if echo "$CHANGED" | grep -q "^apps/$svc/"; then
                  SERVICES_LIST+=("$svc")
                fi
              done
              # `private-location-probe` shares context with `checker` (Go module
              # in apps/checker/) but uses a different Dockerfile target — rebuild
              # whenever apps/checker/** changes.
              if echo "$CHANGED" | grep -q '^apps/checker/'; then
                SERVICES_LIST+=("private-location-probe")
              fi
            fi

            SERVICES=$(printf '%s\n' "${SERVICES_LIST[@]}" | jq -R . | jq -sc .)
          fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Building services: $SERVICES"

  build-and-push:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.services != '[]'
    timeout-minutes: 30
    # GitHub Environment provides AWS_ACCOUNT_ID + AWS_REGION vars (Mercury
    # convention — same as mercury-actions release.yaml). On push to main
    # the env defaults to `dev`. workflow_dispatch lets operators pick
    # nonprod/prod for promotion. Add `required_reviewers` to the prod
    # Environment in repo settings if you want manual approval gates.
    environment: ${{ inputs.target_env || 'dev' }}
    permissions:
      contents: read
      id-token: write   # OIDC → AWS assume role (ECR push)

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
        include:
          - service: server
            context: .
            dockerfile: apps/server/Dockerfile
          - service: dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
          - service: workflows
            context: .
            dockerfile: apps/workflows/Dockerfile
          - service: private-location
            context: apps/private-location
            dockerfile: apps/private-location/Dockerfile
          - service: status-page
            context: .
            dockerfile: apps/status-page/Dockerfile
          - service: checker
            context: apps/checker
            dockerfile: apps/checker/Dockerfile
          # private-location-probe — same Go module as `checker`, different
          # Dockerfile target. Builds `cmd/private/main.go` (the agent that
          # polls private-location for monitor list, runs probes, ingests
          # results). Upstream openstatus does NOT publish this image; we
          # publish it here as ghcr.io/theweathercompany/openstatus-private-location-probe.
          - service: private-location-probe
            context: apps/checker
            dockerfile: apps/checker/private-location.Dockerfile
          # migrate-runner — one-shot Drizzle migration image consumed by the
          # drizzle-migrate-hook in mercury-charts/charts/openstatus-stack.
          # Upstream does not publish this — see apps/migrate-runner/Dockerfile
          # for the rationale (upstream service images are stripped runtime
          # bundles that don't ship the migrate.mts source).
          - service: migrate-runner
            context: .
            dockerfile: apps/migrate-runner/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # AWS ECR auth (TheWeatherCompany fork only — pushes to private ECR)
      #
      # See docs/adr/0002 in TheWeatherCompany/mercury-openstatus for the
      # GHCR-vs-ECR decision. In short: fork is private; charts pull from
      # ECR using existing EKS node IAM; CI auths via OIDC + assume role,
      # matching mercury-actions/release.yaml. dev-only push for Phase 1;
      # ECR replication to nonprod/prod is added at promote time.
      # ─────────────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/mercury-github-actions-su
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names openstatus/${{ matrix.service }} 2>/dev/null \
            || aws ecr create-repository \
                 --repository-name openstatus/${{ matrix.service }} \
                 --image-scanning-configuration scanOnPush=true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr.outputs.registry }}/openstatus/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ecr.outputs.registry }}/openstatus/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 30
